  bio: I have over five years of experience as a Staff R&D Scientist at LANL, where I apply my skills and knowledge in theoretical
    nuclear physics to study the fundamental interactions between neutrons and protons in atomic nuclei and neutron stars.
    I use high-performance computing and machine learning to solve the nuclear many-body problem and to study gravitational
    waves from neutron-star mergers, which are one of the most exciting phenomena in modern astrophysics. I am passionate
    about advancing our understanding of nature and exploring the mysteries of the cosmos.
