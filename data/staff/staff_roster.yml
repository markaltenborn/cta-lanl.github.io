- slug: ed-fenimore
  display_name: Ed Fenimore
  sort_key: fenimore, ed
  email: efenimore@lanl.gov
  photo: /staff/images/ed-fenimore.jpg
  scholar: null
  ads: null
  bio: Ed Fenimore received his PhD from the University of Chicago for work done as a student at Los Alamos. He has spent
    52 years at Los Alamos as an astrophysicist working on the nonproliferation of nuclear weapons and studying gamma-ray
    bursts, the birth of black holes  in the early universe, resulting in more than 300 papers. Appointed a Laboratory Fellow
    in 1998, he was a member of the teams that received the Muhlmann Award for innovative astronomical instrumentation and
    the Rossi Prize for high-energy astrophysics. Ed was the lead Los Alamos scientist on the gamma-ray burst experiments
    on the Swift satellite and the High Energy Transient Explorer satellites. His invention of the uniformly redundant array
    gamma-ray imaging system led to its wide use in high energy astrophysics and his URA Shuttle experiment which flew in
    1991.  More recently, Ed is working on the propagation of electromagnetic pulses through the ionosphere in support of
    our satellite-based sensors to locate nuclear explosions.  Ed is probably best known for his students who are now professors
    in top university  and researchers in national laboratories around the world.
  interests:
  - gamma-ray bursts
  - x-ray and gamma-ray imaging systems
  - satellite design (especially on-board software)
  - geolocation techniques
  - electromagnetic pulses
  - mentoring
