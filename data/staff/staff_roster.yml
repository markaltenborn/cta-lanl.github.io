  bio: I am a scientist at Los Alamos National Laboratory with research focusing on astrophysical plasmas, solar physics,
    and computational modeling. I hold a PhD in Astronomy from New Mexico State University and degrees in astrophysics and
    physics from the University of Georgia. My work explores the thermal and dynamical behavior of optically thin plasmas,
    including radiative instabilities and hydrodynamic processes relevant to the solar atmosphere and other astrophysical
    environments. I develop and apply high-resolution simulations and analytical models to study plasma dynamics and thermal
    instabilities.
