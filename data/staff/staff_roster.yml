  bio: 'Nicole Lloyd-Ronning is an astrophysicist and deputy group leader for the Computational Physics and Methods group
    (CAI-2) She received her B.A. in physics from Cornell University and her Ph.D. in physics from Stanford University, in
    high energy astrophysics. Her research focuses on the multi-scale modeling of transient events.  In particular, she works
    on the microphysics of shock development, particle acceleration, and emission mechanisms of relativistic jets, the jet
    launching processes from black hole-disk systems, and modeling the progenitor systems that create the most luminous events
    in our universe.  She also studies massive star formation and its evolution throughout cosmic time. She is the author
    of <i>Great Mysteries in Astrophysics: A Guide to What We Don’t Know</i>, a book about the most pressing unsolved puzzles in
    our universe. She helps facilitate and shares leadership of LANL’s APS-IDEA group, serves on the board of directors of
    STEMArts Lab, has served as the Internship Coordinator for UNMLA’s Pathways to Achieve Student Excellence (PASE) program,
    and engages  in a number of outreach programs in the Northern NM community and beyond.'
  interests:
  - Transients
  - relativistic jets
  - gamma-ray bursts
  - cosmological evolution of massive stars
  - black hole-disk systems
