  bio: Chris Fryer has worked on a wide variety of physics and astrophysics projects. His primary astrophysics studies include
    the engines, progenitors, and emission from core-collapse supernovae and gamma-ray bursts, neutron star formation and
    populations, and chemical evolution and nucleosynthesis. For his work on core-collapse supernovae, he was named an APS
    fellow and AAAS fellow.. He has also worked extensively in laboratory astrophysics studying turbulence, radiation transport,
    radiation hydrodynamics, and atomic opacities. For his combined astrophysics and laboratory physics work, he was named
    an LANL fellow.  He has also received the E.O. Lawrence award for fusion and plasma physics, the Marcel Grossmann award
    for relativistic astrophysics and the APS Hans Bethe award for nuclear astrophysics.
