- slug: makana-silva
  display_name: Makana Silva
  sort_key: silva, makana
  photo: /postdocs/images/makana-silva.jpg
  email: k14masilv@gmail.com
  scholar: https://scholar.google.com/citations?hl=en&user=UbqEYOQAAAAJ
  ads: https://ui.adsabs.harvard.edu/search/fq=%7B!type%3Daqp%20v%3D%24fq_database%7D&fq_database=(database%3Aastronomy%20OR%20database%3Aphysics)&p_=0&q=%20author%3A%22Silva%2C%20Makana%22%20%20aff%3A%22los%20alamos%22&sort=date%20desc%2C%20bibcode%20desc
  bio: Makana Silva is a Native Hawaiian astrophysicist born and raised in Mākaha on the island of Oʻahu. He graduated with
    his B.S in physics from the University of Hawaiʻi at Mānoa and his Ph.D in physics from The Ohio State University with
    his advisor Christopher Hirata. He was a Director's Fellow at LANL studying gravity on various physical scales as well
    as plasma physics across various energy scales. In parallel to his research, he is also on the Board of Directors and
    Director of Mentorship for the Native Hawaiian non-profit organization ʻOhana Kilo Hōkū (OKH) aiding in the development
    of community-based events where people can learn about the science of the stars from a Hawaiian culture and scientific
    perspective. When he is not working, he enjoys lifting stones, logs, kegs, and other heavy and awkward objects.
  interests:
  - Studying the effects of resonance interactions around extreme mass ratio inspirals on their gravitational wave forms.
    Studying plasma physics around black holes and other high energy systems.
  focus:
  - gravitational waves
  - black holes
  - QFT
  university: The Ohio State University
  division: Computing and Artificial Intelligence
  mentors:
  - Nicole Lloyd-Ronning
  - Hyun Lim
  - Oleg Korobkin
  - Zachary Medin
  - Terrance Strother
  postdoc_start_year: '2023'
  postdoc_end_year: '2026'
  year_joined: '2023'
  recruiting_ok: true

