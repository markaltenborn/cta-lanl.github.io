<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Profile — CTA</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
	<link rel="stylesheet" href="/css/style.css" type="text/css" media="all">
	<link rel="stylesheet" href="/css/cards.css" type="text/css" media="all">
	<link rel="stylesheet" href="/css/postdoc.css" type="text/css" media="all">
	<link rel="stylesheet" href="/css/profiles-common.css" type="text/css" media="all">
	<link rel="stylesheet" href="/css/common-header.css" type="text/css" media="all">

	<link rel="stylesheet" href="//fonts.googleapis.com/css?family=Open+Sans:400,300,600,700,800" type="text/css">
	<link rel="stylesheet" href="//fonts.googleapis.com/css?family=Montserrat:400,700" type="text/css">

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
	<script src="/js/profile-utils.js"></script>
	<script src="/js/apply.js"></script>
</head>
<body>
	<!-- Compact Header -->
	<div id="cta-header"></div>

	<!-- Profile -->
	<div class="team" id="team">
		<div class="container">
			<p style="text-align:left; margin:12px 0 12px;">
				<a href="/postdocs/postdocs.html">&larr; Back to Postdocs</a>
			</p>

			<header class="profile-header">
				<h1 class="profile-name" id="profile-name"></h1>
			</header>

			<div class="profile-grid">
				<aside class="profile-sidebar profile-sidebar-card">
					<img class="profile-photo" id="profile-photo" alt="" loading="lazy">

					<p class="profile-rank" id="profile-rank"></p>

					<ul id="profile-meta-facts" class="profile-meta-list"></ul>

					<div class="profile-link-group">
						<span class="meta-label">Contact</span>
						<ul id="contact-list" class="profile-link-list"></ul>
					</div>

				</aside>

				<div class="profile-content">
					<section class="profile-section" id="bio-section" hidden>
						<h3 class="profile-section-heading">Biography</h3>
						<p class="profile-bio" id="profile-bio"></p>
					</section>
					<section class="profile-section" id="interests-section" hidden>
						<h3 class="profile-section-heading">Research Interests</h3>
						<ul class="profile-interests-chips" id="profile-interests"></ul>
					</section>
					<section class="profile-section" id="profiles-section" hidden>
						<h3 class="profile-section-heading">Scholarly Profiles</h3>
						<ul class="profile-link-chips" id="profile-links"></ul>
					</section>
				</div>
			</div>

			<!-- Full-width sections after the grid -->
			<section class="profile-section profile-fullwidth" id="selected-pubs-section" hidden>
				<h3 class="profile-section-heading">Selected Publications</h3>
				<ul class="profile-papers" id="profile-selected-pubs"></ul>
			</section>

			<section class="profile-section profile-fullwidth" id="papers-section" hidden>
				<h3 class="profile-section-heading">Recent Papers</h3>
				<ul class="profile-papers" id="profile-papers"></ul>
			</section>

			<section class="profile-section" id="participation-section" hidden>
				<h3 class="profile-section-heading">CTA Participation</h3>
				<ul class="postdoc-list profile-stints" id="stints"></ul>
			</section>
		</div>
	</div>
	<!-- //Profile -->

	<!-- Footer -->
	<div id="cta-footer"></div>

	<script>
	(async function () {
		const DATA_BASE   = '/data';
		const IMG_ROSTER  = '/postdocs/images/roster';
		const IMG_YEARS   = '/postdocs/images';
		const DEFAULT_IMG = '/postdocs/images/cta-default.jpg';

		const params = new URL(location.href).searchParams;
		const slug = params.get('slug');

		if (!slug) {
			location.replace('/postdocs/postdocs.html');
			return;
		}

		const roster = await ProfileUtils.fetchYAML(`${DATA_BASE}/postdocs/postdoc_roster.yml`);
		const person = (Array.isArray(roster) ? roster : []).find(p => p.slug === slug);

		if (!person) {
			ProfileUtils.showProfileNotFound('/postdocs/postdocs.html', 'Back to Postdocs');
			return;
		}

		const displayName = person.display_name || ProfileUtils.formatNameFromSlug(slug);
		document.title = `${displayName} — CTA Profile`;
		document.getElementById('profile-name').textContent = displayName;

		// Year-based stint data (used as fallback for university/focus and to render the participation list)
		const years = (await ProfileUtils.fetchYAML(`${DATA_BASE}/postdocs/postdoc_years.yml`)).years || [];
		const lists = await Promise.all(
			years.map(y => ProfileUtils.fetchYAML(`${DATA_BASE}/postdocs/postdocs_${y}.yml`).then(list => ({ y, list })))
		);
		const myYears = lists
			.filter(e => (Array.isArray(e.list) ? e.list : []).some(s => s.slug === slug))
			.map(e => e.y);

		let latestStint = null;
		if (myYears.length) {
			const latestList = (lists.find(e => e.y === myYears[0]) || {}).list || [];
			latestStint = latestList.find(s => s.slug === slug) || null;
		}

		// Photo (year-aware via shared helper)
		const imgEl = document.getElementById('profile-photo');
		imgEl.src = DEFAULT_IMG;
		imgEl.alt = `Photo of ${displayName}`;
		const candidates = ProfileUtils.imageCandidates(slug, person, years, IMG_ROSTER, IMG_YEARS, DEFAULT_IMG);
		ProfileUtils.firstReachableImage(candidates).then(u => { imgEl.src = u; });

		// Rank line: Role · Group · Postdoc YYYY–YYYY (or "since YYYY" if open-ended)
		const rankEl = document.getElementById('profile-rank');
		const escapeHtml = t => t.replace(/&/g, '&amp;').replace(/</g, '&lt;');
		const role = person.role && String(person.role).trim() ? String(person.role).trim() : 'Postdoc';
		const groupSrc = (person.group_code && String(person.group_code).trim())
			|| (person.division && String(person.division).trim())
			|| '';
		const startYear = person.postdoc_start_year || (myYears.length ? myYears[myYears.length - 1] : '');
		const endYear   = person.postdoc_end_year   || '';
		let tenure = '';
		if (startYear && endYear)   tenure = `${startYear}–${endYear}`;
		else if (startYear)         tenure = `since ${startYear}`;
		else if (myYears.length)    tenure = `${myYears[myYears.length - 1]}–${myYears[0]}`;

		const rankParts = [role];
		if (groupSrc) rankParts.push(groupSrc);
		if (tenure)   rankParts.push(tenure);
		rankEl.innerHTML = rankParts.map(escapeHtml).join(' <span class="sep">·</span> ');
		if (!rankParts.length) rankEl.style.display = 'none';

		// Sidebar meta facts: University (multi), Mentors (multi), Current position
		const splitMulti = v => {
			if (Array.isArray(v)) return v.map(s => String(s).trim()).filter(Boolean);
			if (typeof v === 'string') return v.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
			return [];
		};
		const facts = document.getElementById('profile-meta-facts');
		const factPairs = [];
		const unis = splitMulti(person.university || (latestStint && latestStint.university) || '');
		if (unis.length) factPairs.push(['University', unis]);
		const mentors = splitMulti(person.mentors || '');
		if (mentors.length) factPairs.push(['Mentors', mentors]);
		if (person.current_position) factPairs.push(['Currently', [String(person.current_position).trim()]]);

		factPairs.forEach(([label, vals]) => {
			const li = document.createElement('li');
			const lbl = document.createElement('span');
			lbl.className = 'meta-label';
			lbl.textContent = label;
			li.appendChild(lbl);
			vals.forEach((v, i) => {
				if (i > 0) li.appendChild(document.createElement('br'));
				li.appendChild(document.createTextNode(v));
			});
			facts.appendChild(li);
		});

		// Sidebar link groups: split contact (email/phone) from external profiles (scholar/ads/lanl).
		const contactList = document.getElementById('contact-list');
		const linksList = document.getElementById('profile-links');
		const addLink = (parent, href, text) => {
			const li = document.createElement('li');
			const a = document.createElement('a');
			a.href = href;
			a.textContent = text;
			if (!href.startsWith('mailto:') && !href.startsWith('tel:')) {
				a.target = '_blank';
				a.rel = 'noopener';
			}
			li.appendChild(a);
			parent.appendChild(li);
		};
		if (person.email) addLink(contactList, `mailto:${person.email}`, person.email);
		if (person.phone) addLink(contactList, `tel:${person.phone}`, person.phone);

		const lanlUrl = person.lanl || person.lanl_profile;
		let linkCount = 0;
		if (person.scholar) { addLink(linksList, person.scholar, 'Google Scholar'); linkCount++; }
		if (person.ads)     { addLink(linksList, person.ads, 'NASA ADS');           linkCount++; }
		if (lanlUrl)        { addLink(linksList, lanlUrl, 'LANL Profile');          linkCount++; }
		if (linkCount) document.getElementById('profiles-section').hidden = false;

		// Bio with HTML allowlist sanitization
		const bioText = (person.bio && String(person.bio).trim()) || '';
		if (bioText) {
			document.getElementById('profile-bio').innerHTML = ProfileUtils.safeBioHtml(bioText);
			document.getElementById('bio-section').hidden = false;
		}

		// Interests as chips (fall back to latest stint's focus if roster has none)
		let items = ProfileUtils.parseInterests(person.interests);
		if (!items.length && latestStint && latestStint.focus) {
			items = ProfileUtils.parseInterests(latestStint.focus);
		}
		if (items.length) {
			const ul = document.getElementById('profile-interests');
			items.forEach(t => {
				const li = document.createElement('li');
				li.textContent = t;
				ul.appendChild(li);
			});
			document.getElementById('interests-section').hidden = false;
		}

		// Selected publications (form-curated)
		ProfileUtils.renderSelectedPublications(
			person.papers,
			document.getElementById('selected-pubs-section'),
			document.getElementById('profile-selected-pubs')
		);

		// Recent papers (ADS auto-built)
		ProfileUtils.renderRecentPapers(
			'postdocs', slug,
			document.getElementById('papers-section'),
			document.getElementById('profile-papers')
		);

		// CTA Participation (postdoc-specific year list)
		const stintsUl = document.getElementById('stints');
		stintsUl.innerHTML = '';
		myYears.forEach(y => {
			const li = document.createElement('li');
			const link = ProfileUtils.createExternalLink(`/postdocs/year.html?y=${y}`, String(y));
			link.removeAttribute('target');
			link.removeAttribute('aria-label');
			li.appendChild(link);
			stintsUl.appendChild(li);
		});
		if (myYears.length) document.getElementById('participation-section').hidden = false;

		// Footer (no contact partial on profile pages)
		ProfileUtils.loadPartial('#cta-footer', '/partials/footer.html');

		// Strap height syncing
		ProfileUtils.initStrapSync();
	})();
	</script>
</body>
</html>
